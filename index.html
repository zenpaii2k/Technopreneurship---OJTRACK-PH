<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJTrack PH - DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <nav class="sidebar">
            <div class="sidebar-links">
                <a href="#">Task</a>
                <a href="#">Portfolio</a>
                <a href="#">OJT Progress</a>
                <a href="#">Supervisor Feedback</a>
                <a href="#">Recent Activities</a>
                <a href="#">Make PDF Report</a>
                <a href="#">Activities</a>
            </div>
        </nav>

        <div class="top-content">
            
            <header class="dashboard-header">
                <div class="companyheader">
                <img src="" alt="OJTrack PH Logo" class="header-logo">
                <h1 class="site-title">OJTrack PH</h1>
            </div>

                <div class="header-tools">
                    <div class="search-bar">
                        <input type="text" placeholder="Search">
                    </div>
                    <div class="header-icons">
                        <span class="icon">✉️</span>
                        <span class="icon">🔔</span>
                        <span class="icon">👤</span>
                    </div>
                </div>
            </header>

            <div class="main-layout">
                
                <main class="center-content">
                    <section class="ojtprogress-banner">
                        <div class="progress-info">
                            <span class="label">OJT Progress:</span>
                            <div class="progress-bar-container">
                                <div class="progress-fill" style="width: 67%;">67% Complete</div>
                            </div>
                        </div>
                        <h2>Hello (Name) Your OJT will end in:</h2>
                        <h3 class="end-date">FEB 24 2027</h3>
                    </section>

                    <section class="action-grid">
                        <button class="action-btn">Log OJT Attendance</button>
                        <button class="action-btn">Make PDF Report</button>
                        <button class="action-btn">View Supervisor Feedback</button>
                        <button class="action-btn">Task</button>
                        <button class="action-btn">View OJT Progress</button>
                        <button class="action-btn">Activities</button>
                    </section>
                </main>

                <aside class="widgets-area">
                    <div class="widget cal-widget">
                        <h4>Calendar</h4>
                        <div class="cal-placeholder">Jan 2027</div>
                    </div>
                    
                    <div class="widget todo-widget">
                        <span>✓</span>
                        <h4>TO-DO: <span>+</span></h4>
                        <ul class="todo-list">
                            </ul>
                    </div>

                    <div class="widget announce-widget">
                        <h4>Announcements</h4>
                    </div>
                </aside>

            </div> 
        </div> 
    </div>

</body>
</html>

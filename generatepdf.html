<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJTrack PH - DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ojt-attendance-container">

        <div class="top-content">
            
            <header class="dashboard-header">
                <div class="companyheader">
                <img src="" alt="OJTrack PH Logo" class="header-logo">
                <h1 class="site-title">OJTrack PH</h1>
            </div>

                <div class="header-tools">
                    <div class="search-bar">
                        <input type="text" placeholder="Search">
                    </div>
                    <nav class="header-icons">
                        <a href ="#" title = "Messages">✉️</a>
                        <a href ="#" title = "Notifications">🔔</a>
                        <a href ="#" title = "Profile">👤</a>
                        <a href ="#" title = "Light Mode">☀️</a>
                        <a href ="#" title = "Dark Mode">🌙</a>
                    </nav>
                </div>
            </header>

        <main class="tracker-layout">
        
        <section class="ojt-overview-header">
            <div class="title">
                <h2 class="main-title">Report Overview</h2>
                <a href ="#" title = "Settings">⚙️</a>
                <a href ="#" title = "Profile">👤</a>
            </div>

            <div class="student-card">
                <div class="student-info">
                    <h2>Student Profile</h2>
                    <h3>Student Information</h3>
                    <p>Student Name</p>
                    <p>Student ID</p>
                    <p>Course</p>
                    <p>School</p>
                    <p>Company</p>
                    <p>Required Hours</p>
                    <p>Completed Hours</p>
                    
                    <div class="progress-info">
                            <span class="label">Progress:</span>
                            <div class="progress-bar-container">
                                <div class="progress-fill" style="width: 67%;">67%</div>
                            </div>
                        </div>
                    
                </div>

                <form class="manual-form">
                    <h2>Put Data Manually</h2>
                    <div class="manual-form-fill">
                        <h3>Report Content</h3>
                        <p>Document Title</p>
                        <input type ="text" name = "document-title" placeholder="Enter title"> 
                        <label>Content</label>
                        <input type ="text" name = "content" placeholder="Enter content"> 
                    </div>
                    </form>                   
            </div>
        </section>

        <footer class="ojt-attendance-footer">
            <p>Ready to generate report by</p>
            <button class="generate-pdf-btn">Generate PDF Reportt</button>
        </footer>
        </main>
        </div>
        </div>
    </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OJTrack PH - DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">

        <div class="top-content">
            
            <header class="dashboard-header">
                <div class="companyheader">
                <img src="" alt="OJTrack PH Logo" class="header-logo">
                <h1 class="site-title">OJTrack PH</h1>
            </div>

                <div class="header-tools">
                    <div class="search-bar">
                        <input type="text" placeholder="Search">
                    </div>
                    <nav class="header-icons">
                        <a href ="#" title = "Messages">✉️</a>
                        <a href ="#" title = "Notifications">🔔</a>
                        <a href ="#" title = "Profile">👤</a>
                        <a href ="#" title = "Light Mode">☀️</a>
                        <a href ="#" title = "Dark Mode">🌙</a>
                    </nav>
                </div>
            </header>

            <div class="main-layout">
                
                <main class="center-content">
                    <section class="ojt-header">
                        <div class="welcome-info">
                            <h2>Supervisor Dashboard</h2>
                        </div>
                        
                    </section>

                    <section class="action-grid">
                        <button class="action-btn">Check Student Database</button>
                        <button class="action-btn">View Reports</button>
                        <button class="action-btn">Send Supervisor Feedback</button>
                    </section>
                </main>

                <aside class="widgets-area">
                    <div class="widget cal-widget">
                        <h4>Calendar</h4>
                        <div class="cal-placeholder">Jan 2027</div>
                    </div>
                    
                    <div class="widget todo-widget">
                        <span>✓</span>
                        <h4>TO-DO: <span>+</span></h4>
                        <ul class="todo-list">
                            </ul>
                    </div>

                    <div class="widget announce-widget">
                        <h4>Announcements</h4>
                    </div>
                </aside>

            </div> 
        </div> 
    </div>

</body>
</html>
